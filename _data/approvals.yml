steps:
  - order: 1
    title: Approvals Determination
    description: Not every project needs formal approval. If your pool or landscape
      works require council or certifier approval, we will flag this early and
      explain the most suitable pathway for your site and scope of works.
    image: ""
    image_alt: Design review
  - order: 2
    title: Preparing Plans
    description: We provide professional drafting and submission-ready plans
      prepared with buildability, compliance, and practical construction in
      mind. The goal is to have your project documented properly so it can be
      assessed clearly and built correctly the first time.
    image: ""
    image_alt: Preparing plans
  - order: 3
    title: Approval Pathway
    description: Depending on the project, your application may go through a CDC or
      a DA. In NSW, complying development applications are lodged through the
      Planning Portal and involve a certifier, while development applications
      are lodged to the local council for assessment.
    image: ""
    image_alt: Approval pathway
  - order: 4
    title: Supporting Documentation
    description: Some projects require additional documentation before approval can
      be issued. If needed, we will let you know exactly what is required and
      point you in the right direction for items such as surveys, bushfire
      reports, soil testing, stormwater design, flood information, or other
      consultant reports.
    image: ""
    image_alt: Supporting documentation
  - order: 5
    title: Coordination
    description: Epic Landscape Designs helps coordinate the submission process and
      keeps you informed along the way. If the certifier or council requests
      more information, we will explain what is needed and assist in resolving
      it as smoothly as possible.
    image: ""
    image_alt: Coordination
  - order: 6
    title: Approval Granted
    description: Once the relevant authority is satisfied that the proposal meets
      the necessary planning and documentation requirements, approval can be
      granted. From there, your project can move forward with greater confidence
      and clarity.
    image: ""
    image_alt: Approval granted
  - order: 7
    title: Timeframes
    description: As a general rule, CDC approvals are usually faster, while DA
      approvals often take longer because they are assessed by council and may
      involve a more detailed review. Timeframes can vary depending on the site,
      the quality of documentation, and whether any additional reports are
      needed.
    image: ""
    image_alt: Timeframes
