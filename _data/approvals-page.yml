title: "APPROVALS "
description: >-
  Some landscape works require approval, while others may be carried out as
  exempt development depending on the scope, site constraints, and local
  planning controls. In most cases, projects will fall into one of three
  pathways: Development Application (DA), Complying Development Certificate
  (CDC), or Exempt Development.


  We identify the likely approval pathway early and prepare the plans and documentation needed to move your project forward clearly and efficiently.
published: true
