title: "APPROVALS "
description: >-
  Some landscape works require approval, while others may qualify as exempt
  development depending on the scope, site constraints, and local planning
  controls. In most cases, projects will fall into one of three pathways: DA,
  CDC, or Exempt Development.


  Our role is to prepare the required drawings and documentation, identify the likely approval pathway, and help guide the project through the process. Where needed, we liaise with certifiers, councils, and other consultants to coordinate the information required for assessment.
published: true
