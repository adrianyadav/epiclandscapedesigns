title: APPROVALS PROCESS
description: If your project requires approval, we will let you know early in
  the design process. At Epic Landscape Designs, we prepare professional pool
  and landscape documentation and guide you through the approval pathway from
  start to finish. Whether your project is suitable for a Complying Development
  Certificate (CDC) or requires a Development Application (DA), we help make the
  process clear, compliant, and far less stressful.
published: true
