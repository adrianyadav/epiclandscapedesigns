title: "APPROVALS "
description: >-
  Some landscape works require approval, while others may qualify as exempt
  development depending on the scope, site constraints, and local planning
  controls. In most cases, projects will fall into one of three pathways:
  Development Application (DA), Complying Development Certificate (CDC), or
  Exempt Development.


  Our role is to prepare the required drawings and documentation, identify the likely approval pathway, and help guide the project through the process. Depending on the type of application, this may involve working with a certifier or the local council, as well as coordinating any additional consultant information needed for assessment.


